name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build setup.exe + create release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Sync package.json version from tag
        run: node -e "const p=require('./package.json'); p.version='${{ github.ref_name }}'.replace(/^v/,''); require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run build:windows

      - name: Upload setup.exe and create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_electron/Cube Baby Presets Setup *.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync versions from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          node -e "const p=require('./package.json'); p.version='$VER'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          sed -i "s/versionName \".*\"/versionName \"$VER\"/" android/app/build.gradle

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" 2>/dev/null || true
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build renderer (shared web assets)
        run: npx vite build

      - name: Sync Capacitor plugins and web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/cube-baby-presets-${{ github.ref_name }}.apk

      - name: Upload APK to release
        run: gh release upload "${{ github.ref_name }}" android/app/build/outputs/apk/debug/cube-baby-presets-${{ github.ref_name }}.apk --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
